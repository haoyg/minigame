<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>404 - Page Not Found | Pokopie</title>
  <meta name="robots" content="noindex,noarchive" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ffb347" />
  <link rel="canonical" href="https://www.pokopie.com/404" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="permissions-policy" content="camera=(), microphone=(), geolocation=()" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzMiAzMic+PHRleHQgeD0nMTYnIHk9JzI0JyBmb250LXNpemU9JzI0JyB0ZXh0LWFuY2hvcj0nbWlkZGxlJz7wn5iKPC90ZXh0Pjwvc3ZnPg==" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8fafc;
      --bg-soft: #ffffff;
      --accent: #ffb347;
      --accent-strong: #ff8c42;
      --text-main: #0f172a;
      --text-soft: #475569;
      --card-bg: rgba(255, 255, 255, 0.92);
      --glass-90: rgba(255, 255, 255, 0.9);
      --glass-border: rgba(15, 23, 42, 0.12);
      --radius-lg: 18px;
      --radius-full: 999px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.22) 0, transparent 45%),
                  radial-gradient(circle at bottom right, rgba(251, 146, 60, 0.18) 0, transparent 45%),
                  var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    .wrap {
      max-width: 540px;
      width: 100%;
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .logo-mark {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: conic-gradient(from 220deg, #f97316, #facc15, #22c55e, #3b82f6, #a855f7, #f97316);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 18px rgba(249, 115, 22, 0.6);
    }
    .logo-mark span { font-size: 24px; filter: drop-shadow(0 2px 4px rgba(2, 6, 23, 0.18)); }
    .logo-title {
      font-family: "Fredoka One", system-ui, sans-serif;
      font-size: 26px;
      letter-spacing: 0.03em;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.65);
    }
    .card {
      border-radius: 26px;
      background: radial-gradient(circle at top left, rgba(248, 250, 252, 0.08), transparent 65%),
                  var(--card-bg);
      border: 1px solid var(--glass-border);
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.65);
      padding: 36px 32px;
    }
    .code {
      font-size: 72px;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #fb923c, #facc15);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 4px 10px rgba(251, 146, 60, 0.6));
      margin-bottom: 12px;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .desc {
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 24px;
    }
    .btn-primary {
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, #fb923c, #facc15);
      color: #0f172a;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      box-shadow: 0 15px 35px rgba(251, 146, 60, 0.75);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      text-decoration: none;
    }
    .btn-primary:hover {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 22px 40px rgba(251, 146, 60, 0.9);
    }
    .btn-primary span { font-size: 16px; }
    .games {
      margin-top: 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .games a {
      border-radius: var(--radius-full);
      padding: 5px 12px;
      font-size: 12px;
      background: var(--glass-90);
      border: 1px solid var(--glass-border);
      color: var(--text-soft);
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .games a:hover {
      background: linear-gradient(135deg, #fb923c, #facc15);
      color: #0f172a;
      border-color: rgba(248, 250, 252, 0.5);
      transform: translateY(-1px);
    }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo-mark"><span>🎮</span></div>
      <span class="logo-title">Pokopie</span>
    </div>
    <div class="card">
      <div class="code">404</div>
      <div class="title">Page not found</div>
      <p class="desc">The page you're looking for doesn't exist or has been moved. Try heading back home or check out some games below.</p>
      <a href="/" class="btn-primary"><span>←</span> Back to home</a>
      <div class="games">
        <a href="/games/magic-bottles">Magic Bottles</a>
        <a href="/games/stack-tower-pro">Stack Tower Pro</a>
        <a href="/games/2048-merge-world">2048 Merge World</a>
        <a href="/games/archery-legends">Archery Legends</a>
        <a href="/games/bubble-shooter-crystal-hunt">Bubble Shooter</a>
        <a href="/games/emerald-solitaire">Emerald Solitaire</a>
      </div>
    </div>
  </div>
</body>
</html>
