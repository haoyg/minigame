<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Pokopie - Free online browser games">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="20%" cy="10%" r="70%">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrange" cx="85%" cy="85%" r="70%">
      <stop offset="0" stop-color="#fb923c" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0b1220" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowBlue)"/>
  <rect width="1200" height="630" fill="url(#glowOrange)"/>

  <!-- Subtle confetti -->
  <g opacity="0.22">
    <circle cx="1060" cy="120" r="6" fill="#60a5fa"/>
    <circle cx="1020" cy="160" r="4" fill="#facc15"/>
    <circle cx="1120" cy="170" r="5" fill="#34d399"/>
    <circle cx="980" cy="110" r="3" fill="#fb923c"/>
    <circle cx="160" cy="520" r="5" fill="#60a5fa"/>
    <circle cx="210" cy="480" r="3" fill="#facc15"/>
    <circle cx="260" cy="540" r="4" fill="#34d399"/>
    <circle cx="120" cy="470" r="3" fill="#fb923c"/>
  </g>

  <!-- Glass card -->
  <g filter="url(#shadow)">
    <rect x="80" y="110" width="1040" height="410" rx="34" fill="rgba(255,255,255,0.08)" stroke="rgba(148,163,184,0.28)"/>
  </g>

  <!-- Brand mark -->
  <g transform="translate(140 200)" filter="url(#soft)">
    <rect x="0" y="0" width="132" height="132" rx="36" fill="url(#accent)"/>
    <g transform="translate(30 42)" fill="none" stroke="#0f172a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
      <!-- simple gamepad -->
      <path d="M12 36c6-10 14-16 24-16h30c10 0 18 6 24 16 6 10 6 22 0 32-4 6-10 10-18 10-9 0-14-6-20-14H46c-6 8-11 14-20 14-8 0-14-4-18-10-6-10-6-22 0-32z"/>
      <path d="M24 44h18"/>
      <path d="M33 35v18"/>
      <path d="M78 41h0"/>
      <path d="M92 49h0"/>
    </g>
  </g>

  <!-- Text -->
  <g font-family="Poppins, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
    <text x="300" y="270" font-size="74" font-weight="800" fill="#f9fafb" style="letter-spacing:0.5px">Pokopie</text>
    <text x="300" y="320" font-size="26" font-weight="500" fill="rgba(226,232,240,0.92)">Free online browser games " No download</text>
    <text x="300" y="362" font-size="22" font-weight="400" fill="rgba(148,163,184,0.95)">Arcade " Puzzle " Action " Racing " Strategy</text>
  </g>

  <!-- Badge -->
  <g transform="translate(820 215)" filter="url(#soft)">
    <rect x="0" y="0" width="260" height="56" rx="999" fill="rgba(15,23,42,0.78)" stroke="rgba(148,163,184,0.45)"/>
    <rect x="8" y="8" width="40" height="40" rx="999" fill="url(#accent)"/>
    <text x="62" y="36" font-family="Poppins, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="20" font-weight="700" fill="#f9fafb">Play instantly</text>
  </g>
</svg>

