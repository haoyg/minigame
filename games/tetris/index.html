<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <meta property="og:description" content="Play Tetris online free on Pokopie. Stack blocks, clear lines, and beat your high score. No download." />

  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(circle at top, #020617, #020617 40%, #0f172a);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #e5e7eb;
      user-select: none;
      -webkit-user-select: none;
    }

    .back-link {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #93c5fd;
      text-decoration: none;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(148,163,184,0.25);
      transition: background 0.15s;
    }
    .back-link:hover { background: rgba(30,41,59,0.95); text-decoration: none; }

    #wrap {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .side {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 90px;
    }

    .box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 12px;
      padding: 10px 12px;
      text-align: center;
    }

    .lbl {
      font-size: 9px;
      letter-spacing: .1em;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .val {
      font-size: 18px;
      font-weight: 700;
      color: #fbbf24;
      line-height: 1;
    }

    #next-wrap {
      display: flex;
      justify-content: center;
    }

    canvas {
      display: block;
      border-radius: 4px;
      image-rendering: pixelated;
    }

    #c {
      background: #0b1220;
      border: 2px solid rgba(148,163,184,0.2);
      cursor: pointer;
      flex-shrink: 0;
    }

    #ov {
      position: absolute;
      inset: 0;
      background: rgba(2,6,23,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-radius: 4px;
    }
    #ov.hidden { display: none; }
    #ov h2 { font-size: 22px; color: #fbbf24; letter-spacing: .04em; }
    #ov p { font-size: 12px; color: #94a3b8; text-align: center; max-width: 220px; line-height: 1.5; }
    #go { display: none; }

    .btn {
      background: #16a34a;
      color: #fff;
      border: none;
      padding: 9px 26px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: .04em;
    }
    .btn:hover { background: #22c55e; }

    .hint { font-size: 10px; color: #475569; text-align: center; margin-top: 2px; }

    #mc { display: none; gap: 8px; margin-top: 12px; }
    .cb {
      background: rgba(255,255,255,0.06);
      color: #94a3b8;
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 8px;
      width: 48px;
      height: 48px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .cb:active { background: rgba(255,255,255,0.12); }

    @media (max-width: 540px) {
      #wrap { gap: 8px; }
      .side { width: 72px; }
      .val { font-size: 15px; }
      #mc { display: flex; }
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3274781156049995"
    crossorigin="anonymous"></script>
</head>
<body>

<a class="back-link" href="/">&#8592; Back to games</a>

<div id="wrap">
  <div class="side">
    <div class="box">
      <div class="lbl">Score</div>
      <div class="val" id="sc">0</div>
    </div>
    <div class="box">
      <div class="lbl">Lines</div>
      <div class="val" id="li">0</div>
    </div>
    <div class="box">
      <div class="lbl">Level</div>
      <div class="val" id="lv">1</div>
    </div>
    <div class="box" id="next-wrap">
      <canvas id="nc" width="72" height="72"></canvas>
    </div>
  </div>

  <div style="position:relative;">
    <canvas id="c" width="240" height="480"></canvas>
    <div id="ov">
      <h2 id="oh">Tetris</h2>
      <p id="om">Stack the blocks.<br>Clear lines. Beat your score.</p>
      <button class="btn" id="btn">Play</button>
      <div class="hint">&#8592; &#8594; move &nbsp; &#8593; rotate &nbsp; &#8595; soft drop &nbsp; SPACE hard drop</div>
    </div>
  </div>
</div>

<div id="mc">
  <button class="cb" id="ml">&#8592;</button>
  <button class="cb" id="md">&#8595;</button>
  <button class="cb" id="mr">&#8594;</button>
  <button class="cb" id="mz">&#8635;</button>
</div>

<script src="game.js"></script>
</body>
</html>
